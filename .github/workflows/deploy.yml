name: Deploy Medical App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & push backend (Medical-Appointments)
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest ./Medical-Appointments
          docker push ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest

      # Build & push frontend (medical-frontend)
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest ./medical-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

      # Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

            docker stop backend || true
            docker stop frontend || true

            docker rm backend || true
            docker rm frontend || true

            docker run -d --name backend -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest
            docker run -d --name frontend -p 3000:80 ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest