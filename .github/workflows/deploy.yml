name: Deploy Medical App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub (more reliable method)
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build & push backend
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest ./Medical-Appointments
          docker push ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest

      # Build & push frontend
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest ./medical-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

      # Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

            docker stop backend || true
            docker stop frontend || true

            docker rm backend || true
            docker rm frontend || true

            # Backend (Spring Boot)
            docker run -d --restart always --name backend -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest

            # Frontend (React + Nginx)
            docker run -d --restart always --name frontend -p 3000:80 ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest