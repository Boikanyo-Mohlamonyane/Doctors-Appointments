name: Deploy Medical App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------------- DOCKER LOGIN ----------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ---------------- BACKEND BUILD ----------------
      - name: Build Backend (Clean Cache)
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest \
            ./Medical-Appointments

          docker push ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest

      # ---------------- FRONTEND BUILD ----------------
      - name: Build Frontend (Clean Cache)
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest \
            ./medical-frontend

          docker push ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

      # ---------------- DEPLOY TO EC2 ----------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Stopping old containers..."
            docker rm -f backend frontend nginx || true

            echo "Creating Docker network..."
            docker network create medical-net || true

            echo "Pulling latest images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

            echo "Starting backend..."
            docker run -d \
              --restart always \
              --name backend \
              --network medical-net \
              ${{ secrets.DOCKER_USERNAME }}/medical-backend:latest

            echo "Starting frontend..."
            docker run -d \
              --restart always \
              --name frontend \
              --network medical-net \
              ${{ secrets.DOCKER_USERNAME }}/medical-frontend:latest

            echo "Creating nginx config..."
            cat <<EOF > nginx.conf
            server {
                listen 80;

                location / {
                    proxy_pass http://frontend:80;
                }

                location /api/ {
                    proxy_pass http://backend:8080/api/;

                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                }
            }
            EOF

            echo "Starting nginx..."
            docker run -d \
              --restart always \
              --name nginx \
              --network medical-net \
              -p 80:80 \
              -v $(pwd)/nginx.conf:/etc/nginx/conf.d/default.conf \
              nginx

            echo "Deployment complete!"