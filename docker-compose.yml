version: "3.9"

services:

  # 🗄 MYSQL
  mysql:
    image: mysql:8
    container_name: medical_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_app
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 🚀 SPRING BOOT BACKEND
  backend:
    build: ./medical-appointments
    container_name: medical_backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/medical_app
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  # 🌐 REACT FRONTEND
  frontend:
    build: ./medical-frontend
    container_name: medical_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:8080/api

volumes:
  mysql_data: