server {
    listen 80;

    # FRONTEND
    location / {
        proxy_pass http://frontend:80;
    }

    # BACKEND
    location /api/ {
        proxy_pass http://backend:8080/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # OPTIONAL safety
        proxy_http_version 1.1;
    }
}